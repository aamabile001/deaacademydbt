version: 2

models:
  - name: employee
    description: "Employee DBT model"
    columns:
      - name: EMP_ID
        data_tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: ['1','2','3','4','5']
                config: 
                  severity: Warn
      - name: emp_salary
        data_tests:
          - salary_check
  - name: customer
    description: "DBT Model for the customer table"
  - name: customer_vw
    description: "DBT Model for the customer view"
  - name: sales
    description: "DBT Model for the sales table"
  - name: product
    description: "DBT Model for the product table"
  - name: purchase
    description: "DBT Model for the purchase table"
  - name: clean_orders
    description: "DBT Model for the clean orders table"
  - name: final_orders
    description: "DBT Model for the final orders table"

sources:
  - name: employee
    database: DBT_DB
    schema: PUBLIC
    tables:
      - name: EMPLOYEE_RAW
  - name: customer
    database: DBT_DB
    schema: PUBLIC
    tables:
      - name: CUSTOMER_SRC
  - name: sales
    database: DBT_DB
    schema: PUBLIC
    tables:
      - name: SALES_SRC
  - name: product
    database: DBT_DB
    schema: PUBLIC
    tables:
      - name: PRODUCT_SRC
  - name: purchase
    database: DBT_DB
    schema: PUBLIC
    tables:
      - name: PURCHASE_SRC
  - name: orders
    database: DBT_DB
    schema: PUBLIC
    tables:
      - name: BASE_ORDERS


